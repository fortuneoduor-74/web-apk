{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 75vh;">
    <div class="col-md-4">
        <div class="card p-4 shadow-lg border-0" style="background-color: var(--bg-surface) !important;">
            <div class="text-center mb-4">
                <h3 class="fw-bold text-white mb-1">Access Terminal</h3>
                <p class="text-muted small">Initialize credentials validation linkage</p>
            </div>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label small text-secondary fw-semibold">Email Address</label>
                    <input type="email" name="email" class="form-control" placeholder="name@domain.com" required>
                </div>
                <div class="mb-4">
                    <label class="form-label small text-secondary fw-semibold">Account Password</label>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2.5 fw-bold text-uppercase" style="background-color: var(--accent-blue); border: none;">Authenticate Connection</button>
                <p class="mt-4 text-center text-muted small mb-0">New Operator? <a href="{{ url_for('register') }}" class="text-decoration-none fw-bold" style="color: var(--accent-blue)">Register Node</a></p>
            </form>
        </div>
    </div>
</div>
{% endblock %}
